name: profeapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  intl: ^0.19.0
  image_picker: ^1.0.7
  http: ^1.2.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/profeApp.png"
  adaptive_icon_background: "#FFFFFF" # solo para Android
  adaptive_icon_foreground: "assets/images/profeApp.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/

